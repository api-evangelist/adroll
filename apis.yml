aid: adroll
name: AdRoll
description: >-
  AdRoll is a display advertising and retargeting platform from NextRoll that
  helps direct-to-consumer brands run cross-channel display, social, and email
  campaigns from a single dashboard powered by the BidIQ machine learning
  bidder. The platform manages audience segmentation, creative serving, and
  attribution across the open web and major social networks. The NextRoll API
  for AdRoll exposes campaign, ad, audience, and reporting endpoints using
  OAuth 2.0 or Personal Access Token authentication.
